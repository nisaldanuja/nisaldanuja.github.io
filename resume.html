<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume | Nisal Danuja</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Base styles matching your theme */
        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Resume Content Wrapper */
        .resume-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1; /* Pushes footer to the bottom */
        }

        /* Top Bar containing the Download Button on the Right */
        .resume-actions {
            display: flex;
            justify-content: flex-end; /* Aligns to the right corner */
            margin-bottom: 20px;
        }

        /* Download Button Styling */
        .download-btn {
            background-color: transparent;
            color: #4cc9f0;
            border: 2px solid #4cc9f0;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px; /* Space between icon and text */
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background-color: #4cc9f0;
            color: #0f172a;
            cursor: pointer;
        }

        /* Medium Sized Resume Preview Panel */
        .resume-preview {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            width: 100%;
            height: 600px; /* Gives it a medium portrait height */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .resume-preview iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header style="padding: 20px; border-bottom: 1px solid #334155; text-align: center;">
        <h1 style="color: #4cc9f0; margin: 0;">My Portfolio</h1>
    </header>

    <main class="resume-container">
        
        <div class="resume-actions">
            <a href="my-resume.pdf" download="Nisal_Danuja_Resume.pdf" class="download-btn">
                <i class="fa-solid fa-download"></i> Download Resume
            </a>
        </div>

        <div class="resume-preview">
            <iframe src="my-resume.pdf#toolbar=0" title="Resume Preview"></iframe>
        </div>

    </main>

    <footer style="padding: 20px; border-top: 1px solid #334155; text-align: center; font-size: 0.9rem; color: #64748b;">
        <p>&copy; 2026 Nisal Danuja. All Rights Reserved.</p>
    </footer>

</body>
</html>
