header{
    text-align:center;
    padding:40px 20px;
    border-bottom:1px solid #1f3a52;
    animation:fadeDown 1s ease;
}

        header p{color:#9fb3c8;margin-top:5px;}
        


        /* Resume Content Wrapper */
        .resume-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1; /* Pushes footer to the bottom */
        }

        /* Top Bar containing the Download Button on the Right */
        .resume-actions {
            display: flex;
            justify-content: flex-end; /* Aligns to the right corner */
            margin-bottom: 20px;
        }

        /* Download Button Styling */
        .download-btn {
            background-color: transparent;
            color: #4cc9f0;
            border: 2px solid #4cc9f0;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px; /* Space between icon and text */
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background-color: #4cc9f0;
            color: #0f172a;
            cursor: pointer;
        }

        /* Medium Sized Resume Preview Panel */
        .resume-preview {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            width: 100%;
            height: 600px; /* Gives it a medium portrait height */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .resume-preview iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

nav{
    display:flex;
    justify-content:center;
    flex-wrap: wrap;
    gap:15px;
    background:#0f2438;
    padding:12px;
    position:sticky;
    top:0;
    z-index: 1000;
}

nav a{
    color:#9fb3c8;
    text-decoration:none;
    position:relative;
    font-size: 14px;
}

nav a:hover{color:#4cc9f0;}

nav a::after{
    content:"";
    position:absolute;
    bottom:-4px;
    left:0;
    width:0%;
    height:2px;
    background:#4cc9f0;
    transition:.3s;
}

nav a:hover::after{width:100%;}

		h1{
    font-size:30px;
    background:linear-gradient(90deg,#4cc9f0,#00b4d8);
    -webkit-background-clip:text;
    color:transparent;
}

		/* UPDATED FOOTER TO ALIGN IN ONE LINE */
footer {

}

section{

h2{

.card{
    background:#162d44;
    padding:15px;
    margin-top:10px;
    border-radius:12px;
    border:1px solid #1f3a52;
    transition: transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
}

/* 1. MOUSE HOVER (For Computer) */
.card:hover {
    transform:translateY(-6px);
    box-shadow:0 10px 25px rgba(0,0,0,0.6);
    border-color:#4cc9f0;
}
.card:hover p, .card:hover li { color:#d9f3ff; }

/* 2. AUTOMATIC SCROLL EFFECT (For Mobile/Tablet) */
.card.active-scroll {
    transform:translateY(-6px);
    box-shadow:0 10px 25px rgba(0,0,0,0.6);
    border-color:#4cc9f0;
}
.card.active-scroll p, .card.active-scroll li { color:#d9f3ff; }

ul{padding-left:20px;}

.icon{
    color:#4cc9f0;
    margin-right:8px;
}

/* UPDATED FOOTER TO ALIGN IN ONE LINE */
footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    max-width: 900px;
    margin: 30px auto 0 auto;
    padding: 20px;
    border-top: 1px solid #1f3a52;
    color: #8aa4bd;
}

/* RESPONSIVE DESIGN BREAKPOINTS */
@media (max-width: 768px) {
    h1 { font-size: 24px; }
    nav { gap: 10px; padding: 10px; }
    nav a { font-size: 13px; }
    section { padding: 20px 15px; }
    h2 { font-size: 20px; }
    
    /* Responsive adjustment for footer on tablets/mobile */
    footer {
        flex-direction: column;
        gap: 15px;
        text-align: center;
    }
}

@media (max-width: 480px) {
    header { padding: 30px 10px; }
    h1 { font-size: 20px; }
    nav { gap: 8px; }
    nav a { font-size: 12px; }
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(20px);} 
    to{opacity:1;transform:translateY(0);} 
}

@keyframes fadeDown{
    from{opacity:0;transform:translateY(-20px);} 
    to{opacity:1;transform:translateY(0);} 
}
