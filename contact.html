<style>
/* NO CHANGES TO YOUR ORIGINAL STYLES */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0b1a2b,#0f2438);
    color:#e6edf3;
    overflow-x: hidden;
}

header{
    text-align:center;
    padding:40px 20px;
    border-bottom:1px solid #1f3a52;
    animation:fadeDown 1s ease;
}

h1{
    font-size:30px;
    background:linear-gradient(90deg,#4cc9f0,#00b4d8);
    -webkit-background-clip:text;
    color:transparent;
}

header p{color:#9fb3c8;margin-top:5px;}

nav{
    display:flex;
    justify-content:center;
    flex-wrap: wrap;
    gap:15px;
    background:#0f2438;
    padding:12px;
    position:sticky;
    top:0;
    z-index: 1000;
}

nav a{
    color:#9fb3c8;
    text-decoration:none;
    position:relative;
    font-size: 14px;
}

nav a:hover{color:#4cc9f0;}

nav a::after{
    content:"";
    position:absolute;
    bottom:-4px;
    left:0;
    width:0%;
    height:2px;
    background:#4cc9f0;
    transition:.3s;
}

nav a:hover::after{width:100%;}

section{
    max-width:900px;
    margin:auto;
    padding:30px 20px;
    animation:fadeUp 1s ease;
}

h2{
    border-left:4px solid #4cc9f0;
    padding-left:10px;
    margin-bottom:15px;
    font-size: 22px;
}

.card{
    background:#162d44;
    padding:15px;
    margin-top:10px;
    border-radius:12px;
    border:1px solid #1f3a52;
    transition: transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
}

/* 1. MOUSE HOVER (For Computer) */
.card:hover {
    transform:translateY(-6px);
    box-shadow:0 10px 25px rgba(0,0,0,0.6);
    border-color:#4cc9f0;
}
.card:hover p, .card:hover li { color:#d9f3ff; }

/* 2. AUTOMATIC SCROLL EFFECT (For Mobile/Tablet) */
.card.active-scroll {
    transform:translateY(-6px);
    box-shadow:0 10px 25px rgba(0,0,0,0.6);
    border-color:#4cc9f0;
}
.card.active-scroll p, .card.active-scroll li { color:#d9f3ff; }

ul{padding-left:20px;}

.icon{
    color:#4cc9f0;
    margin-right:8px;
}

footer{
    text-align:center;
    padding:20px;
    border-top:1px solid #1f3a52;
    margin-top:30px;
    color:#8aa4bd;
}

/* RESPONSIVE DESIGN BREAKPOINTS */
@media (max-width: 768px) {
    h1 { font-size: 24px; }
    nav { gap: 10px; padding: 10px; }
    nav a { font-size: 13px; }
    section { padding: 20px 15px; }
    h2 { font-size: 20px; }
}

@media (max-width: 480px) {
    header { padding: 30px 10px; }
    h1 { font-size: 20px; }
    nav { gap: 8px; }
    nav a { font-size: 12px; }
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(20px);} 
    to{opacity:1;transform:translateY(0);} 
}

@keyframes fadeDown{
    from{opacity:0;transform:translateY(-20px);} 
    to{opacity:1;transform:translateY(0);} 
}
</style>
