<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Nisal Ranasinghe</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0b1a2b, #0f2438);
    color: #e6edf3;
    margin: 0;
}

/* 🔥 HEADER (NEW) */
header {
    text-align: center;
    padding: 35px 20px 25px;
    background: #0f2438;
    border-bottom: 1px solid #1f3a52;
}

header h1 {
    font-size:30px;
    background:linear-gradient(90deg,#4cc9f0,#00b4d8);
    -webkit-background-clip:text;
    color:transparent;
}

header a {
    color: #4cc9f0;
    margin-left: 6px;
    font-size: 30px;
}

header p {
   color:#9fb3c8;margin-top:5px;
}

/* NAV */
nav {
    display: flex;
    justify-content: center;
    background: #0f2438;
    padding: 12px;
    gap: 20px;
}

nav a {
    color: #9fb3c8;
    text-decoration: none;
    font-size: 14px;
}

nav a:hover {
    color: #4cc9f0;
}

/* FORM SECTION */
section {
    max-width: 600px;
    margin: 50px auto;
    padding: 20px;
    background: #162d44;
    border-radius: 12px;
    border: 1px solid #1f3a52;
}

h2 {
    color: #4cc9f0;
    margin-bottom: 20px;
    text-align: center;
}

/* FORM */
.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    margin-bottom: 5px;
    color: #9fb3c8;
}

input, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #1f3a52;
    background: #0b1a2b;
    color: white;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    background: #4cc9f0;
    color: #0b1a2b;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00b4d8;
    transform: translateY(-2px);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 18px 10px;
    margin-top: 60px;
    border-top: 1px solid #1f3a52;
    color: #8aa4bd;
    font-size: 14px;
    background: rgba(11, 26, 43, 0.6);
}

/* MOBILE */
@media (max-width: 480px) {
    section { margin: 20px; }
}
</style>

	<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
	
</head>

<body>

<!-- HEADER -->
<header>
    <h1>
        Nisal Danuja Ranasinghe
        <a href="https://www.linkedin.com/in/nisaldanujaranasinghe/" target="_blank">
            <i class="fa-brands fa-linkedin"></i>
        </a>
    </h1>
    <p>Student | ICT Enthusiast | Leader</p>
</header>

<!-- NAV -->
<nav>
    <a href="index.html">Home</a>
    <a href="index.html#education">Education</a>
    <a href="index.html#skills">Skills</a>
</nav>

<!-- CONTACT FORM -->
<section>
    <h2>Get In Touch</h2>

    <form action="https://formspree.io/f/xeenooyd" method="POST" onsubmit="showPopup()>
        <div class="form-group">
            <label>Your Name*</label>
            <input type="text" name="name">
        </div>

        <div class="form-group">
            <label>Your Email*</label>
            <input type="email" name="email">
        </div>
		
		<div class="form-group">
            <label>Your Contact Number</label>
            <input type="number" name="number">
        </div>
		
		

        <div class="form-group">
            <label>Message*</label>
            <textarea name="message" rows="5"></textarea>
        </div>

        <button type="submit">Send Message</button>
    </form>
</section>

<script>
    function showPopup() {
        swal("Success!", "Your message has been submitted!", "success");
    }
</script>

<!-- FOOTER -->
<footer>
    <p>© 2026 Nisal Ranasinghe | Portfolio Website</p>
</footer>

	
</body>
</html>
